<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products — Mini Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --accent: #a5b4fc;
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --bg-nav: rgba(15, 23, 42, 0.7);
            --bg-card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: var(--bg-nav);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-size: 1.75rem;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-brand span {
            color: var(--primary);
        }

        .navbar-nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 400;
            position: relative;
            padding: 0.5rem 0;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #ffffff;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: var(--primary);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-cta {
            background: var(--primary);
            color: #ffffff;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .nav-cta:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .navbar-toggler {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .navbar-toggler {
                display: block;
            }

            .navbar-nav {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: var(--bg-nav);
                backdrop-filter: blur(16px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                padding: 1.5rem 0;
                text-align: center;
                gap: 1.5rem;
            }

            .navbar-nav.active {
                display: flex;
            }
        }

        /* ── Page header ── */
        .page-header {
            padding: 3rem 5% 1.5rem;
        }

        .page-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* ── Table card ── */
        .table-wrap {
            margin: 0 5% 4rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(99, 102, 241, 0.12);
        }

        thead th {
            padding: 1rem 1.2rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            white-space: nowrap;
        }

        tbody tr {
            border-top: 1px solid var(--border);
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        tbody td {
            padding: 0.85rem 1.2rem;
            font-size: 0.95rem;
            vertical-align: middle;
        }

        .product-img {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .img-placeholder {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .desc-cell {
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-muted);
        }

        .price-cell {
            font-weight: 600;
            color: var(--accent);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.28rem 0.7rem;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .actions {
            display: flex;
            gap: 0.4rem;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-icon.edit:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-icon.delete:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .table-footer {
            padding: 0.8rem 1.2rem;
            border-top: 1px solid var(--border);
            font-size: 0.83rem;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state svg {
            opacity: 0.35;
            margin-bottom: 1rem;
            display: block;
            margin-inline: auto;
        }

        .empty-state h3 {
            color: var(--text-main);
            margin-bottom: 0.4rem;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a class="navbar-brand" href="/">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" style="color: #6366f1;">
                <path
                    d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
                </path>
            </svg>
            Mini<span>Store</span>
        </a>

        <button class="navbar-toggler" onclick="document.getElementById('nav-menu').classList.toggle('active')">
            ☰
        </button>

        <div class="navbar-nav" id="nav-menu">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/products">Products</a>
            <a class="nav-link" href="/about">About Us</a>
            <a class="nav-link" href="/contact">Contact</a>
        </div>
    </nav>

    <!-- Page header -->
    <div class="page-header">
        <h1>Products</h1>
        <p>Manage your entire product catalogue in one place.</p>
        <a href="/products/createProduct" class="btn btn-primary">Add Product</a>
    </div>

    <!-- Products table -->
    <div class="table-wrap">

        <!-- Table shown when products exist -->
        <div th:if="${products != null and !#lists.isEmpty(products)}">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p, stat : ${products}">

                        <!-- Row number -->
                        <td style="color:var(--text-muted);font-size:0.85rem;" th:text="${stat.index + 1}"></td>

                        <!-- Image -->
                        <td>
                            <img th:if="${p.image != null and !#strings.isEmpty(p.image)}" th:src="${p.image}"
                                th:alt="${p.name}" class="product-img" onerror="this.style.display='none'">
                            <div th:if="${p.image == null or #strings.isEmpty(p.image)}" class="img-placeholder">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="1.5">
                                    <rect x="3" y="3" width="18" height="18" rx="3" />
                                    <circle cx="8.5" cy="8.5" r="1.5" />
                                    <path d="M21 15l-5-5L5 21" />
                                </svg>
                            </div>
                        </td>

                        <!-- Name -->
                        <td style="font-weight:600;" th:text="${p.name}"></td>

                        <!-- Description -->
                        <td class="desc-cell" th:text="${p.description}"></td>

                        <!-- Price -->
                        <td class="price-cell">
                            $<span th:text="${#numbers.formatDecimal(p.price, 1, 2)}"></span>
                        </td>

                        <!-- Stock -->
                        <td>
                            <span th:if="${p.stock > 10}" class="badge badge-success">
                                &#9679;&nbsp;<span th:text="${p.stock}"></span> in stock
                            </span>
                            <span th:if="${p.stock > 0 and p.stock <= 10}" class="badge badge-warning">
                                &#9679;&nbsp;Low &mdash; <span th:text="${p.stock}"></span> left
                            </span>
                            <span th:if="${p.stock == 0}" class="badge badge-danger">
                                &#9679;&nbsp;Out of stock
                            </span>
                        </td>

                        <!-- Actions -->
                        <td>
                            <div class="actions">
                                <a th:href="@{/products/editProduct(id=${p.id})}" class="btn-icon edit" title="Edit">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
                                        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
                                    </svg>
                                </a>
                                <a th:href="@{/products/deleteProduct(id=${p.id})}" class="btn-icon delete" title="Delete"
                                    onclick="return confirm('Delete this product?')">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <polyline points="3 6 5 6 21 6" />
                                        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
                                        <path d="M10 11v6M14 11v6M9 6V4h6v2" />
                                    </svg>
                                </a>
                            </div>
                        </td>

                    </tr>
                </tbody>
            </table>

            <div class="table-footer">
                Showing <strong th:text="${#lists.size(products)}"></strong>
                product<span th:if="${#lists.size(products) != 1}">s</span>
            </div>
        </div>

        <!-- Empty state -->
        <div th:if="${products == null or #lists.isEmpty(products)}" class="empty-state">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="1.2">
                <path
                    d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <h3>No products yet</h3>
            <p>Add your first product to get started.</p>
        </div>

    </div>

</body>

</html>
